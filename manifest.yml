modules:
  macro:
    - key: confmaid-mermaid-macro
      title: Confmaid Mermaid Diagram
      description: Render Mermaid diagrams from text inside Confluence pages.
      resource: main
      config:
        resource: main
        openOnInsert: true
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/main

app:
  runtime:
    name: nodejs24.x
  id: ari:cloud:ecosystem::app/0b3b5533-2d59-473d-a8c3-bc2d3705e736

permissions:
  scopes:
    - read:confluence-content.summary
    - write:confluence-content
