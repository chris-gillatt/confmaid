<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confmaid</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f6f2;
        --panel: #ffffff;
        --ink: #202124;
        --accent: #0d6efd;
        --ok: #198754;
        --warn: #d97706;
        --error: #b42318;
        --border: #d6d4cc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at 0% 0%, #fffdf7, var(--bg));
        color: var(--ink);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 12px;
      }

      @media (min-width: 960px) {
        .layout {
          grid-template-columns: 1fr 1fr;
        }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        font-size: 14px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: #fcfbf8;
      }

      textarea {
        width: 100%;
        min-height: 320px;
        border: 0;
        resize: vertical;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.4;
      }

      .field {
        display: grid;
        gap: 6px;
        padding: 12px 12px 0;
      }

      .field label {
        font-size: 12px;
        font-weight: 600;
        color: #454950;
      }

      .field input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        background: #fcfbf8;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 600;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button.secondary {
        background: #5b5f66;
      }

      button.warning {
        background: #c26a00;
      }

      .status {
        padding: 8px 12px;
        border-top: 1px solid var(--border);
        font-size: 12px;
      }

      .status.ok {
        color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.error {
        color: var(--error);
      }

      #preview {
        min-height: 390px;
        padding: 12px;
        overflow: auto;
      }

      #diagnostics {
        margin: 0;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        background: #fffdfa;
        font-size: 12px;
        color: #5c5f66;
      }

      #diagnostics li + li {
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h2>Mermaid Source</h2>
        <div class="field">
          <label for="title">Diagram title</label>
          <input id="title" type="text" value="Mermaid diagram" maxlength="120" />
        </div>
        <textarea id="source">
flowchart TD
  A[User opens page] --> B[Insert Confmaid macro]
  B --> C[Paste Mermaid source]
  C --> D[Render diagram]</textarea
        >
        <div class="actions">
          <button id="loadBtn" type="button" class="secondary">Load Saved</button>
          <button id="saveBtn" type="button">Save Config</button>
          <button id="validateBtn" type="button" class="warning">Validate</button>
          <button id="renderBtn" type="button">Render Preview</button>
          <button id="resetBtn" type="button" class="secondary">Reset Example</button>
        </div>
        <div id="status" class="status">Ready.</div>
        <ul id="diagnostics"></ul>
      </section>

      <section class="panel">
        <h2>Preview</h2>
        <div id="preview" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="./vendor/forge-bridge.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
