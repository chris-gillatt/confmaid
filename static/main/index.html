<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confmaid</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel source-panel">
        <h2>Mermaid Source</h2>
        <div class="runtime-info edit-actions">
          <strong>Runtime version:</strong>
          <span id="runtimeVersion">Loading...</span>
        </div>
        <div class="field">
          <label for="title">Diagram title</label>
          <input id="title" type="text" value="Mermaid diagram" maxlength="120" />
        </div>
        <div class="field edit-actions">
          <label for="displayMode">Display mode</label>
          <select id="displayMode">
            <option value="standard">Standard — diagram only in page view</option>
            <option value="dual">Dual — source and diagram in page view</option>
          </select>
        </div>
        <textarea id="source" rows="10">
flowchart TD
  A[User opens page] --> B[Insert Confmaid macro]
  B --> C[Paste Mermaid source]
  C --> D[Render diagram]</textarea
        >
        <div class="actions edit-actions">
          <button id="loadBtn" type="button" class="secondary">Revert</button>
          <button id="saveBtn" type="button">Save and Close</button>
          <button id="validateBtn" type="button" class="warning">Validate</button>
          <button id="renderBtn" type="button">Render Preview</button>
          <button id="resetBtn" type="button" class="secondary">Reset Example</button>
        </div>
        <div id="status" class="status edit-actions">Ready.</div>
        <ul id="diagnostics" class="edit-actions"></ul>
      </section>

      <section class="panel preview-panel">
        <h2 id="previewTitle">Mermaid diagram</h2>
        <div id="editorHint" class="editor-hint">
          Select this macro and click <strong>Configure</strong> (sliders icon) to edit.
        </div>
        <div id="preview" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="./vendor/forge-bridge.js"></script>
    <script type="module" src="./vendor/mermaid.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
